[build]
  command = "npm --prefix cruise-road install && npm --prefix cruise-road run build"
  publish = "cruise-road/dist"

[[redirects]]
  from = "/api/*"
  to = "https://cruiseroad.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
